# ═══════════════════════════════════════════════════════════════════════════════
# FlickTV AI — Docker Compose (Production)
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── API Backend ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flicktv-api
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - flicktv-network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: flicktv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - flicktv-network

networks:
  flicktv-network:
    driver: bridge
